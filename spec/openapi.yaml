openapi: "3.1.0"
info:
  title: Kirimin API
  description: |
    Multi-courier shipping aggregator API for Indonesia.
    
    Covers: coverage area lookup, rate quoting, order creation, 
    tracking, webhooks, payment, and courier management.
    
    **Authentication:** Bearer token via `Authorization` header.
  version: "0.1.0"
  contact:
    name: ongki.pro
    url: https://ongki.pro

servers:
  - url: http://localhost:8787
    description: Local development
  - url: https://api.kirimin.dev
    description: Sandbox (future)

paths:
  # ==========================================
  # Phase 1: Coverage Area endpoints
  # ==========================================
  # ==========================================
  # Phase 1: Pricing endpoints
  # ==========================================
  # ==========================================
  # Phase 2: Order endpoints
  # ==========================================
  # ==========================================
  # Phase 2: Tracking endpoints
  # ==========================================
  # ==========================================
  # Phase 3: Webhook endpoints
  # ==========================================
  # ==========================================
  # Phase 3: Payment endpoints
  # ==========================================

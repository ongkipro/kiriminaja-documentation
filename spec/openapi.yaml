  # ==========================================

# TODO: uncomment and fill in as each section is designed
#   /coverage-area/province:
#     get:
#       summary: List provinces
#       ...

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as Bearer token

  schemas:
    # Will be populated during Phase 1
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: integer
          description: Error code
        text:
          type: string
          description: Human-readable error message
      required:
        - success
        - text

security:
  - BearerAuth: []

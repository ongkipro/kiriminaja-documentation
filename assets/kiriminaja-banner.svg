<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="200" rx="12" fill="url(#bg)"/>
  
  <!-- Accent line -->
  <rect x="60" y="40" width="80" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Title -->
  <text x="60" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" fill="#ffffff">
    KiriminAja API
  </text>
  <text x="60" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="400" fill="#94a3b8">
    Reference Documentation
  </text>
  
  <!-- Right side: badges -->
  <g transform="translate(680, 50)">
    <!-- Pages badge -->
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="55" y="19" font-family="monospace" font-size="13" font-weight="600" fill="#22d3ee" text-anchor="middle">34 pages</text>
    
    <!-- Endpoints badge -->
    <rect x="120" y="0" width="130" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="185" y="19" font-family="monospace" font-size="13" font-weight="600" fill="#22d3ee" text-anchor="middle">18+ endpoints</text>
    
    <!-- OpenAPI badge -->
    <rect x="260" y="0" width="110" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="315" y="19" font-family="monospace" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle">OpenAPI 3.1</text>

    <!-- Last update -->
    <rect x="380" y="0" width="150" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="455" y="19" font-family="monospace" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">2026-07-07</text>
  </g>
  
  <!-- Bottom: courier list -->
  <text x="60" y="175" font-family="monospace" font-size="12" fill="#64748b">
    JNE · SiCepat · J&amp;T · Anteraja · Ninja · Lion · IDExpress · SAP · Pos Indonesia
  </text>

  <!-- Right: attribution -->
  <text x="1140" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" text-anchor="end">
    curated by ongki.pro
  </text>
</svg>
